# Product Flatpak packaging is intentionally disabled. The portable ChatGPT
# payload must be extracted locally from the user's reviewed official DMG and
# may not be redistributed in a Flatpak. This manifest fails closed so it can
# never package the historical Rust/WebKit public-web client by mistake.
app-id: io.github.chatgpt_work_linux
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: chatgpt-work-linux

modules:
  - name: disabled-chatgpt-work-linux-product-build
    buildsystem: simple
    build-commands:
      - |-
        echo 'Flatpak product packaging is disabled; use the local ChatGPT.dmg transaction.' >&2
        exit 2
    sources: []
